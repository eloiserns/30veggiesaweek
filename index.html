<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>30 Plants a Week Challenge</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #0F6E56; --green-mid: #9FE1CB;
  --text: #1a1a1a; --text-muted: #666; --text-hint: #aaa;
  --bg: #f5f4f0; --surface: #ffffff;
  --border: rgba(0,0,0,0.11); --border-hover: rgba(0,0,0,0.22);
  --radius: 12px; --radius-sm: 8px; --radius-pill: 99px;
}
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-tap-highlight-color: transparent; }

/* HEADER */
#page-header { background: var(--green); color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
#page-header h1 { font-size: 20px; font-weight: 700; }
#page-header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
#counter-pill { background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.45); border-radius: var(--radius-pill); padding: 7px 18px; text-align: center; min-width: 100px; }
#counter-pill .num { font-size: 28px; font-weight: 700; line-height: 1; }
#counter-pill .lbl { font-size: 11px; opacity: 0.8; margin-top: 2px; }

/* PROGRESS */
#prog-wrap { background: white; padding: 9px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
#prog-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
#prog-outer { flex: 1; height: 10px; background: #e4e4e0; border-radius: var(--radius-pill); overflow: hidden; }
#prog-inner { height: 100%; background: var(--green); border-radius: var(--radius-pill); width: 0%; transition: width 0.4s ease; }
#prog-pct { font-size: 12px; font-weight: 600; color: var(--green); min-width: 32px; }
#celebrate { display: none; background: var(--green-light); border-bottom: 1px solid var(--green-mid); padding: 8px 20px; text-align: center; font-size: 13px; font-weight: 600; color: var(--green-dark); }

/* LAYOUT - desktop */
#main { display: grid; grid-template-columns: 272px 1fr; height: calc(100vh - 108px); }
#sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#sidebar-inner { padding: 12px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#sidebar h2 { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 9px; }
#search-box { width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; color: var(--text); background: var(--bg); margin-bottom: 8px; outline: none; font-family: inherit; }
#search-box:focus { border-color: var(--green); }
#cat-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.cat-btn { padding: 3px 9px; font-size: 11px; border-radius: var(--radius-pill); border: 1px solid var(--border); cursor: pointer; background: var(--bg); color: var(--text-muted); font-family: inherit; transition: all 0.15s; touch-action: manipulation; }
.cat-btn:hover { border-color: var(--green); color: var(--green); }
.cat-btn.active { background: var(--green); color: white; border-color: var(--green); }

/* FOOD LIST */
#food-list { flex: 1; overflow-y: auto; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 5px; padding-right: 2px; }
#food-list::-webkit-scrollbar { width: 4px; }
#food-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
.food-chip { padding: 6px 10px; font-size: 12px; border-radius: var(--radius-pill); border: 1px solid var(--border); cursor: grab; background: var(--bg); color: var(--text); transition: background 0.15s, border-color 0.15s, transform 0.1s; white-space: nowrap; user-select: none; font-family: inherit; display: flex; align-items: center; gap: 5px; touch-action: manipulation; }
.food-chip .chip-img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); background: #eee; flex-shrink: 0; }
.food-chip .chip-img.loading { opacity: 0; }
.food-chip:active:not(.used) { transform: scale(0.96); }
.food-chip:hover:not(.used) { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
.food-chip.used { opacity: 0.28; cursor: default; pointer-events: none; }
.food-chip.touch-selected { border-color: var(--green); background: var(--green-light); color: var(--green-dark); box-shadow: 0 0 0 3px rgba(29,158,117,0.25); }
.food-chip.touch-dragging-ghost { position: fixed; z-index: 9999; pointer-events: none; opacity: 0.85; transform: scale(1.08); box-shadow: 0 6px 20px rgba(0,0,0,0.18); border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
.no-results { font-size: 13px; color: var(--text-hint); padding: 6px; }

/* MOBILE TOUCH HINT */
#touch-hint { display: none; font-size: 11px; color: var(--text-hint); text-align: center; padding: 4px 0 2px; font-style: italic; }

/* IMAGE TOOLTIP - desktop only */
#img-tooltip { position: fixed; z-index: 1000; pointer-events: none; display: none; flex-direction: column; align-items: center; background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.13); max-width: 160px; }
#img-tooltip img { width: 140px; height: 140px; object-fit: cover; border-radius: var(--radius-sm); display: block; }
#img-tooltip span { font-size: 12px; color: var(--text-muted); margin-top: 6px; text-align: center; font-weight: 500; }

/* WEEK GRID */
#week-area { background: var(--bg); overflow-y: auto; padding: 12px 16px 80px; display: flex; flex-direction: column; gap: 8px; }
#week-area::-webkit-scrollbar { width: 5px; }
#week-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
.day-row { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; min-height: 66px; transition: border-color 0.15s, background 0.15s; }
.day-row.drag-over { border-color: var(--green); background: var(--green-light); }
.day-row.touch-target-highlight { border-color: var(--green); background: var(--green-light); box-shadow: 0 0 0 3px rgba(29,158,117,0.2); }
.day-header { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
.day-chips { display: flex; flex-wrap: wrap; gap: 6px; min-height: 30px; align-content: flex-start; }
.drop-hint { font-size: 12px; color: var(--text-hint); align-self: center; font-style: italic; }
.placed-chip { padding: 5px 10px; font-size: 12px; border-radius: var(--radius-pill); border: 1.5px solid; cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; font-family: inherit; transition: filter 0.15s; touch-action: manipulation; }
.placed-chip img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(0,0,0,0.1); background: #eee; flex-shrink: 0; }
.placed-chip:hover { filter: brightness(0.9); }
.placed-chip .rx { font-size: 10px; opacity: 0.5; }
.placed-chip:hover .rx, .placed-chip:active .rx { opacity: 1; }

/* DAY PICKER MODAL (mobile) */
#day-picker { display: none; position: fixed; inset: 0; z-index: 2000; }
#day-picker-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
#day-picker-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 16px 16px 40px; animation: slideUp 0.22s ease; max-height: 80vh; overflow-y: auto; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
#day-picker-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
#day-picker-img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); background: #eee; flex-shrink: 0; }
#day-picker-title { font-size: 16px; font-weight: 600; color: var(--text); }
#day-picker-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
#day-picker-close { margin-left: auto; background: none; border: none; font-size: 22px; color: var(--text-muted); cursor: pointer; padding: 4px 8px; line-height: 1; }
#day-picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.day-pick-btn { padding: 12px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; text-align: left; display: flex; align-items: center; justify-content: space-between; transition: all 0.15s; touch-action: manipulation; }
.day-pick-btn:active { background: var(--green-light); border-color: var(--green); }
.day-pick-btn.already-has { border-color: var(--green-mid); color: var(--text-muted); }
.day-pick-btn .day-count { font-size: 11px; color: var(--text-hint); }

/* BOTTOM BAR */
#bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); padding: 8px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 50; }
#bottom-bar .tip { font-size: 11px; color: var(--text-hint); }
#reset-btn { padding: 6px 14px; font-size: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: white; color: var(--text-muted); cursor: pointer; font-family: inherit; touch-action: manipulation; }
#reset-btn:hover, #reset-btn:active { border-color: #D85A30; color: #D85A30; }

/* MOBILE LAYOUT */
@media (max-width: 680px) {
  #main { grid-template-columns: 1fr; height: auto; min-height: calc(100vh - 108px); }
  #sidebar { border-right: none; border-bottom: 1px solid var(--border); height: auto; max-height: 44vh; }
  #week-area { overflow: visible; padding-bottom: 90px; }
  #touch-hint { display: block; }
  #bottom-bar .tip { display: none; }
  #page-header p { display: none; }
}
</style>
</head>
<body>

<div id="img-tooltip"><img id="tt-img" src="" alt="" /><span id="tt-name"></span></div>

<!-- DAY PICKER MODAL -->
<div id="day-picker" role="dialog" aria-modal="true" aria-label="Choose a day">
  <div id="day-picker-backdrop"></div>
  <div id="day-picker-sheet">
    <div id="day-picker-header">
      <img id="day-picker-img" src="" alt="" />
      <div>
        <div id="day-picker-title"></div>
        <div id="day-picker-sub">Tap a day to add</div>
      </div>
      <button id="day-picker-close" aria-label="Close">✕</button>
    </div>
    <div id="day-picker-grid"></div>
  </div>
</div>

<header id="page-header">
  <div>
    <h1>30 Plants a Week</h1>
    <p>Drag fruits and vegetables onto any day — repeat across days is fine! Aim for 30 different plants.</p>
  </div>
  <div id="counter-pill">
    <div class="num" id="count-num">0</div>
    <div class="lbl">plants</div>
  </div>
</header>

<div id="prog-wrap">
  <span id="prog-label">Progress:</span>
  <div id="prog-outer"><div id="prog-inner"></div></div>
  <span id="prog-pct">0%</span>
</div>
<div id="celebrate"></div>

<main id="main">
  <aside id="sidebar">
    <div id="sidebar-inner">
      <h2>Fruits &amp; Vegetables</h2>
      <input id="search-box" type="search" placeholder="Search..." aria-label="Search" autocomplete="off" />
      <div id="cat-tabs"></div>
      <div id="touch-hint">Tap a plant, then choose a day</div>
      <div id="food-list"></div>
    </div>
  </aside>
  <section id="week-area"></section>
</main>

<div id="bottom-bar">
  <span class="tip">Hover to preview photo. Click a placed plant to remove it.</span>
  <button id="reset-btn">Clear all</button>
</div>

<script>
// ── FOOD DATA ──────────────────────────────────────────────────────────────
const FOODS = {
  "Vegetables": [
    ["Broccoli"],["Carrot"],["Spinach"],["Capsicum (red)","Capsicum"],["Capsicum (yellow)","Capsicum"],
    ["Capsicum (orange)","Capsicum"],["Tomato"],["Cucumber"],["Zucchini"],["Pumpkin"],
    ["Beetroot"],["Sweet potato"],["Potato"],["Onion"],["Garlic"],["Ginger"],
    ["Celery"],["Leek"],["Cabbage"],["Cauliflower"],["Brussels sprouts"],["Eggplant"],
    ["Green beans","Green bean"],["Snow peas","Snow pea"],["Peas","Pea"],["Corn"],
    ["Asparagus"],["Kale"],["Silverbeet","Chard"],["Bok choy"],["Broccolini"],["Fennel"],
    ["Radish"],["Turnip"],["Parsnip"],["Mushroom"],["Rocket","Arugula"],["Lettuce"],
    ["Baby spinach","Spinach"],["Watercress"],["Okra"],["Artichoke"],["Taro"],["Yam"],
    ["Spring onion","Scallion"],["Shallot"],["Chilli","Chili pepper"],["Bitter melon"],
    ["Molokhia"],["Purslane"],["Choko","Chayote"]
  ],
  "Fruits": [
    ["Apple"],["Banana"],["Mango"],["Orange"],["Watermelon"],["Strawberry"],["Grapes","Grape"],
    ["Blueberry"],["Raspberry"],["Pear"],["Peach"],["Plum"],["Apricot"],["Cherry"],["Kiwi","Kiwifruit"],
    ["Pineapple"],["Papaya"],["Passionfruit","Passion fruit"],["Guava"],["Pomegranate"],["Lemon"],
    ["Lime"],["Grapefruit"],["Mandarin","Mandarin orange"],["Fig"],["Date","Date palm"],["Lychee"],
    ["Dragonfruit","Dragon fruit"],["Persimmon"],["Quince"],["Mulberry"],["Nectarine"],["Avocado"],
    ["Coconut"],["Jackfruit"],["Tamarind"],["Feijoa"],["Starfruit","Carambola"],
    ["Rockmelon","Cantaloupe"],["Honeydew melon","Honeydew"],["Cumquat","Kumquat"],["Blackberry"],
    ["Rambutan"],["Longan"],["Blood orange"]
  ],
  "Legumes": [
    ["Red lentils","Lentil"],["Green lentils","Lentil"],["Chickpeas","Chickpea"],["Black beans","Black bean"],
    ["Kidney beans","Kidney bean"],["Cannellini beans","Cannellini bean"],["Edamame"],
    ["Broad beans","Broad bean"],["Mung beans","Mung bean"],["Adzuki beans","Adzuki bean"],
    ["Butter beans","Butter bean"],["Split peas","Split pea"],["Black-eyed peas","Black-eyed pea"],
    ["Fava beans","Fava bean"],["Borlotti beans","Borlotti bean"]
  ],
  "Grains & Seeds": [
    ["Teff (injera)","Teff"],["Barley"],["Oats"],["Quinoa"],["Brown rice","Rice"],
    ["Rye"],["Millet"],["Sorghum"],["Flaxseed"],["Chia seeds","Chia"],
    ["Sunflower seeds","Sunflower"],["Pumpkin seeds","Pumpkin"],["Sesame seeds","Sesame"],
    ["Walnuts","Walnut"],["Almonds","Almond"],["Pistachios","Pistachio"],["Cashews","Cashew"],
    ["Pine nuts","Pine nut"],["Hemp seeds","Hemp"]
  ],
  "Herbs & Spices": [
    ["Parsley"],["Coriander"],["Mint"],["Basil"],["Thyme"],["Rosemary"],
    ["Turmeric (fresh)","Turmeric"],["Cumin"],["Berbere spice","Berbere"],
    ["Za'atar","Zaatar"],["Sumac"],["Fenugreek"],["Dill"],["Lemongrass"],
    ["Galangal"],["Cardamom"],["Nigella seeds","Nigella sativa"],["Molokhia"]
  ]
};

const COLORS = [
  {bg:"#E1F5EE",border:"#1D9E75",text:"#0F6E56"},{bg:"#FAECE7",border:"#D85A30",text:"#712B13"},
  {bg:"#E6F1FB",border:"#378ADD",text:"#185FA5"},{bg:"#FAEEDA",border:"#BA7517",text:"#633806"},
  {bg:"#FBEAF0",border:"#D4537E",text:"#72243E"},{bg:"#EAF3DE",border:"#639922",text:"#3B6D11"},
  {bg:"#EEEDFE",border:"#7F77DD",text:"#3C3489"},{bg:"#F1EFE8",border:"#888780",text:"#2C2C2A"},
];
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

// ── STATE ─────────────────────────────────────────────────────────────────
const state = { placed: {}, drag: null, touchSelected: null };
DAYS.forEach(d => state.placed[d] = []);
const imgCache = {};

const allFoods = [];
Object.entries(FOODS).forEach(([cat, items]) =>
  items.forEach(([name, wiki]) => allFoods.push({name, cat, wiki: wiki || name}))
);
const seenNames = new Set();
const uniqueFoods = [];
allFoods.forEach(f => { if (!seenNames.has(f.name)) { seenNames.add(f.name); uniqueFoods.push(f); } });

// ── DETECT TOUCH ──────────────────────────────────────────────────────────
const isTouchDevice = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;

// ── HELPERS ───────────────────────────────────────────────────────────────
function colorFor(name) {
  let h = 0; for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return COLORS[h % COLORS.length];
}
function getUsed() {
  const s = new Set(); DAYS.forEach(d => state.placed[d].forEach(f => s.add(f))); return s;
}

// ── WIKIPEDIA IMAGE FETCH ──────────────────────────────────────────────────
async function fetchWikiImage(food) {
  const key = food.name;
  if (imgCache[key] !== undefined) return imgCache[key];
  imgCache[key] = null;
  try {
    const r = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(food.wiki)}`,
      { headers: { 'Api-User-Agent': '30PlantsTracker/1.0 (classroom tool)' } }
    );
    if (!r.ok) throw new Error();
    const d = await r.json();
    imgCache[key] = d.thumbnail?.source || null;
  } catch { imgCache[key] = null; }
  return imgCache[key];
}

function prefetchVisible(foods) {
  foods.slice(0, 40).forEach((f, i) => {
    if (imgCache[f.name] === undefined) {
      setTimeout(() => fetchWikiImage(f).then(() => updateChipImages(f.name)), i * 60);
    }
  });
}

function updateChipImages(name) {
  const url = imgCache[name];
  if (!url) return;
  document.querySelectorAll(`[data-name="${CSS.escape(name)}"]`).forEach(img => {
    img.src = url;
    img.classList.remove('loading');
  });
}

// ── TOOLTIP (desktop) ──────────────────────────────────────────────────────
const tooltip = document.getElementById('img-tooltip');
const ttImg = document.getElementById('tt-img');
const ttName = document.getElementById('tt-name');
let ttVisible = false;

function showTooltip(name, x, y) {
  if (isTouchDevice()) return;
  const url = imgCache[name];
  if (!url) return;
  ttImg.src = url; ttName.textContent = name;
  tooltip.style.display = 'flex'; ttVisible = true;
  positionTT(x, y);
}
function positionTT(x, y) {
  const tw = 160, th = 180;
  let left = x + 14, top = y - 90;
  if (left + tw > window.innerWidth - 10) left = x - tw - 14;
  if (top < 10) top = 10;
  if (top + th > window.innerHeight - 10) top = window.innerHeight - th - 10;
  tooltip.style.left = left + 'px'; tooltip.style.top = top + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; ttVisible = false; }
document.addEventListener('mousemove', e => { if (ttVisible) positionTT(e.clientX, e.clientY); });

// ── COUNTER ────────────────────────────────────────────────────────────────
function updateCounter() {
  const n = getUsed().size;
  document.getElementById('count-num').textContent = n;
  const pct = Math.min(100, Math.round(n / 30 * 100));
  document.getElementById('prog-inner').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  const cel = document.getElementById('celebrate');
  if (n >= 30) {
    cel.style.display = 'block';
    cel.textContent = n === 30 ? '🌿 You reached 30 plants this week! Amazing!' : `🌿 Incredible! ${n} different plants this week!`;
  } else { cel.style.display = 'none'; }
}

// ── DAY PICKER MODAL (touch/tap) ───────────────────────────────────────────
const modal = document.getElementById('day-picker');
const pickerImg = document.getElementById('day-picker-img');
const pickerTitle = document.getElementById('day-picker-title');
const pickerGrid = document.getElementById('day-picker-grid');

function openDayPicker(foodName) {
  const fObj = uniqueFoods.find(f => f.name === foodName);
  pickerTitle.textContent = foodName;
  pickerImg.src = imgCache[foodName] || '';
  pickerImg.style.display = imgCache[foodName] ? 'block' : 'none';

  pickerGrid.innerHTML = '';
  const used = getUsed();

  DAYS.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'day-pick-btn';
    const count = state.placed[day].length;
    btn.innerHTML = `<span>${day}</span><span class="day-count">${count} plant${count !== 1 ? 's' : ''}</span>`;
    btn.addEventListener('click', () => {
      state.placed[day].push(foodName);
      closeDayPicker();
      renderAll();
    });
    pickerGrid.appendChild(btn);
  });

  modal.style.display = 'block';
  document.body.style.overflow = 'hidden';
  pickerImg.src = imgCache[foodName] || '';

  // ensure image is loaded
  if (fObj && !imgCache[foodName]) {
    fetchWikiImage(fObj).then(url => { if (url) pickerImg.src = url; });
  }
}

function closeDayPicker() {
  modal.style.display = 'none';
  document.body.style.overflow = '';
  state.touchSelected = null;
  document.querySelectorAll('.touch-selected').forEach(el => el.classList.remove('touch-selected'));
}

document.getElementById('day-picker-backdrop').addEventListener('click', closeDayPicker);
document.getElementById('day-picker-close').addEventListener('click', closeDayPicker);

// ── RENDER FOOD LIST ───────────────────────────────────────────────────────
let activeCategory = 'All';
let searchTerm = '';

function renderFoodList() {
  const list = document.getElementById('food-list');
  list.innerHTML = '';
  const filtered = uniqueFoods.filter(f => {
    const matchCat = activeCategory === 'All' || f.cat === activeCategory;
    const matchSearch = f.name.toLowerCase().includes(searchTerm.toLowerCase());
    return matchCat && matchSearch;
  });
  if (!filtered.length) {
    const el = document.createElement('div'); el.className = 'no-results'; el.textContent = 'No results.';
    list.appendChild(el); return;
  }

  filtered.forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'food-chip';
    chip.dataset.food = f.name;

    const cImg = document.createElement('img');
    cImg.className = 'chip-img' + (imgCache[f.name] ? '' : ' loading');
    cImg.setAttribute('data-name', f.name);
    cImg.alt = f.name;
    if (imgCache[f.name]) cImg.src = imgCache[f.name];
    chip.appendChild(cImg);

    const label = document.createElement('span');
    label.textContent = f.name;
    chip.appendChild(label);

    // DESKTOP: drag
    chip.draggable = true;
    chip.addEventListener('dragstart', e => {
      state.drag = f.name;
      e.dataTransfer.setData('text/plain', f.name);
      chip.style.opacity = '0.4';
    });
    chip.addEventListener('dragend', () => chip.style.opacity = '');
    chip.addEventListener('mouseenter', e => {
      if (imgCache[f.name] === undefined) {
        fetchWikiImage(f).then(() => { if (chip.matches(':hover')) showTooltip(f.name, e.clientX, e.clientY); });
      } else showTooltip(f.name, e.clientX, e.clientY);
    });
    chip.addEventListener('mouseleave', hideTooltip);

    // TOUCH: tap to open day picker
    chip.addEventListener('click', e => {
      if (!isTouchDevice()) return;
      e.preventDefault();
      openDayPicker(f.name);
    });

    list.appendChild(chip);
  });

  prefetchVisible(filtered);
}

function renderCategoryTabs() {
  const tabs = document.getElementById('cat-tabs');
  tabs.innerHTML = '';
  ['All', ...Object.keys(FOODS)].forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => { activeCategory = cat; renderAll(); });
    tabs.appendChild(btn);
  });
}

// ── RENDER WEEK ────────────────────────────────────────────────────────────
function renderPlacedChips(day) {
  const container = document.getElementById('chips-' + day);
  if (!container) return;
  container.innerHTML = '';
  if (!state.placed[day].length) {
    const hint = document.createElement('span');
    hint.className = 'drop-hint';
    hint.textContent = isTouchDevice() ? 'Tap a plant, then tap a day' : 'Drop a plant here';
    container.appendChild(hint); return;
  }
  state.placed[day].forEach(foodName => {
    const col = colorFor(foodName);
    const chip = document.createElement('button');
    chip.className = 'placed-chip';
    chip.style.background = col.bg;
    chip.style.borderColor = col.border;
    chip.style.color = col.text;
    chip.title = 'Tap to remove ' + foodName;

    const pImg = document.createElement('img');
    pImg.setAttribute('data-name', foodName);
    pImg.alt = foodName;
    pImg.style.cssText = 'width:22px;height:22px;border-radius:50%;object-fit:cover;border:1px solid rgba(0,0,0,0.1);background:#eee;flex-shrink:0;';
    if (imgCache[foodName]) pImg.src = imgCache[foodName];
    else {
      const fObj = uniqueFoods.find(f => f.name === foodName);
      if (fObj) fetchWikiImage(fObj).then(url => { if (url) pImg.src = url; });
    }
    chip.appendChild(pImg);

    const lbl = document.createElement('span'); lbl.textContent = foodName; chip.appendChild(lbl);
    const rx = document.createElement('span'); rx.className = 'rx'; rx.textContent = '✕'; chip.appendChild(rx);

    chip.addEventListener('click', () => {
      const idx = state.placed[day].indexOf(foodName);
      if (idx !== -1) state.placed[day].splice(idx, 1);
      renderAll();
    });
    chip.addEventListener('mouseenter', e => showTooltip(foodName, e.clientX, e.clientY));
    chip.addEventListener('mouseleave', hideTooltip);
    container.appendChild(chip);
  });
}

function buildWeekGrid() {
  const area = document.getElementById('week-area');
  area.innerHTML = '';
  DAYS.forEach(day => {
    const row = document.createElement('div');
    row.className = 'day-row';

    const hdr = document.createElement('div');
    hdr.className = 'day-header'; hdr.textContent = day;

    const chips = document.createElement('div');
    chips.className = 'day-chips'; chips.id = 'chips-' + day;
    chips.innerHTML = '<span class="drop-hint">Drop a plant here</span>';

    row.appendChild(hdr); row.appendChild(chips);

    // DESKTOP: drag-and-drop
    row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault(); row.classList.remove('drag-over');
      const food = e.dataTransfer.getData('text/plain') || state.drag;
      if (!food) return;
      state.placed[day].push(food); renderAll();
    });

    area.appendChild(row);
  });
}

function renderAll() {
  renderCategoryTabs();
  renderFoodList();
  DAYS.forEach(d => renderPlacedChips(d));
  updateCounter();
}

document.getElementById('search-box').addEventListener('input', e => { searchTerm = e.target.value; renderAll(); });
document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Clear all plants from the week?')) { DAYS.forEach(d => state.placed[d] = []); renderAll(); }
});

buildWeekGrid();
renderAll();
</script>
</body>
</html>
